databaseChangeLog:
  - changeSet:
      id : 002-create-hall-table
      author: fmi
      changes:
        - createTable:
            tableName: hall
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false