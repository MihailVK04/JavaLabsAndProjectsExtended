databaseChangeLog:
  - changeSet:
      id: 008-create-reservation-table
      author: fmi
      changes:
        - createTable:
            tableName: reservation
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: performance_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: seat_label
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: customer_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                 name: reserved_at
                 type: TIMESTAMP
                 constraints:
                   nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
        - addForeignKeyConstraint:
            baseTableName: reservation
            baseColumnNames: performance_id
            referencedTableName: performance
            referencedColumnNames: id
            constraintName: fk_reservation_performance
        - addUniqueConstraint:
            tableName: reservation
            columnNames: performance_id, seat_label
            constraintName: uq_reservation_seat